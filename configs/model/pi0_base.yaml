# Pi0 Base Model Configuration
# A balanced VLA model for general robot learning

model:
  name: "pi0_base"
  
  vision:
    type: "siglip"
    pretrained: "siglip-so400m-patch14-384"
    freeze: false
    
  language:
    type: "gemma"
    pretrained: "google/gemma-2b"
    freeze: true
    
  fusion:
    type: "cross_attention"
    hidden_dim: 768
    num_heads: 8
    num_layers: 2
    dropout: 0.1
    
  action_head:
    type: "flow_matching"
    action_dim: 7
    chunk_size: 10
    hidden_dim: 512
    num_steps: 50
