# DROID Finetuning Configuration

training:
  batch_size: 32
  num_epochs: 50
  grad_accum_steps: 4
  
  grad_clip: 1.0
  use_amp: true
  
  optimizer:
    type: "AdamW"
    lr: 3e-4
    weight_decay: 0.1
    betas: [0.9, 0.95]
    
  scheduler:
    type: "cosine"
    warmup_steps: 1000
    min_lr: 1e-5
    
  checkpoint:
    save_every: 1000
    keep_last: 5
    
  logging:
    log_every: 100
    wandb_project: "vla-droid"

data:
  type: "rlds"
  data_dir: "data/droid"
  
  image:
    height: 224
    width: 224
    normalize: true
    color_jitter: true
    random_crop: true
    flip: false
    
  action:
    dim: 7
    chunk_size: 10
    normalize: true
    
  max_text_length: 64
  num_workers: 4
  pin_memory: true
