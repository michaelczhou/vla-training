# ALOHA Finetuning Configuration

training:
  batch_size: 64
  num_epochs: 100
  grad_accum_steps: 2
  
  grad_clip: 1.0
  use_amp: true
  
  optimizer:
    type: "AdamW"
    lr: 5e-4
    weight_decay: 0.05
    betas: [0.9, 0.95]
    
  scheduler:
    type: "cosine"
    warmup_steps: 500
    min_lr: 1e-5
    
  checkpoint:
    save_every: 500
    keep_last: 5
    
  logging:
    log_every: 50
    wandb_project: "vla-aloha"

data:
  type: "lerobot"
  data_dir: "data/aloha"
  
  image:
    height: 224
    width: 224
    normalize: true
    color_jitter: true
    random_crop: true
    flip: true  # ALOHA benefits from flip augmentation
    
  action:
    dim: 14  # ALOHA has 14 DoF (2 arms x 7)
    chunk_size: 10
    normalize: true
    
  max_text_length: 64
  num_workers: 4
  pin_memory: true
