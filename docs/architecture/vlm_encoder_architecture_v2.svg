<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变色定义 -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4C9AFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10FF9D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F87171;stop-opacity:1" />
    </linearGradient>
    
    <!-- 箭头 -->
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#333" />
    </marker>
    
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1600" height="1200" fill="#F8FAFC"/>
  
  <!-- 标题 -->
  <text x="800" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#1E293B">
    π₀ VLM Encoder 完整架构详解
  </text>
  <text x="800" y="80" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#64748B">
    PaliGemma-3B: Vision + Language → Context Vector
  </text>
  
  <!-- ==================== 输入层 ==================== -->
  <!-- RGB Image -->
  <rect x="100" y="130" width="220" height="130" fill="url(#blueGrad)" rx="10" filter="url(#shadow)"/>
  <text x="210" y="165" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="white">RGB Image</text>
  <text x="210" y="195" font-family="Arial" font-size="13" text-anchor="middle" fill="white">224×224×3</text>
  <text x="210" y="220" font-family="Arial" font-size="11" text-anchor="middle" fill="white">Pixel Values [0,1]</text>
  <text x="210" y="245" font-family="Arial" font-size="11" text-anchor="middle" fill="white">Batch: [B,3,224,224]</text>
  
  <!-- Language Text -->
  <rect x="370" y="130" width="220" height="130" fill="url(#greenGrad)" rx="10" filter="url(#shadow)"/>
  <text x="480" y="165" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Language Text</text>
  <text x="480" y="195" font-family="Arial" font-size="13" text-anchor="middle" fill="white">Token Sequence</text>
  <text x="480" y="220" font-family="Arial" font-size="11" text-anchor="middle" fill="white">["清理桌子", ...]</text>
  <text x="480" y="245" font-family="Arial" font-size="11" text-anchor="middle" fill="white">Batch: [B, seq_len]</text>
  
  <!-- Proprio State -->
  <rect x="640" y="130" width="220" height="130" fill="url(#purpleGrad)" rx="10" filter="url(#shadow)"/>
  <text x="750" y="165" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Proprio State</text>
  <text x="750" y="195" font-family="Arial" font-size="13" text-anchor="middle" fill="white">Joint Positions</text>
  <text x="750" y="220" font-family="Arial" font-size="11" text-anchor="middle" fill="white">[q₁, q₂, ..., q₇]</text>
  <text x="750" y="245" font-family="Arial" font-size="11" text-anchor="middle" fill="white">Batch: [B, 7]</text>
  
  <!-- ==================== Vision Encoder ==================== -->
  <rect x="950" y="110" width="320" height="260" fill="url(#blueGrad)" rx="10" filter="url(#shadow)"/>
  <text x="1110" y="145" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="white">Vision Encoder</text>
  <text x="1110" y="170" font-family="Arial" font-size="14" text-anchor="middle" fill="white">(SigLIP ViT)</text>
  
  <!-- Patch Embedding -->
  <rect x="970" y="190" width="280" height="55" fill="rgba(255,255,255,0.25)" rx="6"/>
  <text x="1110" y="215" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Patch Embedding</text>
  <text x="1110" y="235" font-family="Arial" font-size="11" text-anchor="middle" fill="white">Conv2d(3→1152, k=14, s=14)</text>
  
  <!-- Position Embed -->
  <rect x="970" y="255" width="280" height="45" fill="rgba(255,255,255,0.2)" rx="5"/>
  <text x="1110" y="280" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="white">+ Position Embedding</text>
  <text x="1110" y="297" font-family="Arial" font-size="10" text-anchor="middle" fill="white">[257, 1152] = 1 [CLS] + 256 patches</text>
  
  <!-- Transformer Blocks -->
  <rect x="970" y="310" width="280" height="50" fill="rgba(255,255,255,0.15)" rx="5"/>
  <text x="1110" y="335" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Transformer Blocks ×27</text>
  <text x="1110" y="353" font-family="Arial" font-size="10" text-anchor="middle" fill="white">MHA(16 heads) + MLP(1152→4608→1152)</text>
  
  <!-- ==================== Projector ==================== -->
  <rect x="1320" y="130" width="220" height="140" fill="url(#purpleGrad)" rx="10" filter="url(#shadow)"/>
  <text x="1430" y="165" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Multi-Modal</text>
  <text x="1430" y="190" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Projector</text>
  <text x="1430" y="220" font-family="Arial" font-size="12" text-anchor="middle" fill="white">Linear: 1152→2048</text>
  <text x="1430" y="242" font-family="Arial" font-size="12" text-anchor="middle" fill="white">GELU + Linear</text>
  <text x="1430" y="262" font-family="Arial" font-size="11" text-anchor="middle" fill="white">Output: [256, 2048]</text>
  
  <!-- ==================== Language Model ==================== -->
  <rect x="950" y="420" width="590" height="200" fill="url(#greenGrad)" rx="10" filter="url(#shadow)"/>
  <text x="1245" y="455" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="white">Language Model (Gemma-2B)</text>
  
  <!-- Token Embedding -->
  <rect x="970" y="475" width="550" height="50" fill="rgba(255,255,255,0.25)" rx="6"/>
  <text x="1245" y="500" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Token Embedding + Vision Feature Concat</text>
  <text x="1245" y="520" font-family="Arial" font-size="11" text-anchor="middle" fill="white">[&lt;bos&gt;, &lt;image&gt;×256, text_tokens] → [1+256+seq_len, 2048]</text>
  
  <!-- Transformer Blocks -->
  <rect x="970" y="535" width="550" height="75" fill="rgba(255,255,255,0.2)" rx="6"/>
  <text x="1245" y="562" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Transformer Encoder Blocks ×18</text>
  <text x="1245" y="582" font-family="Arial" font-size="11" text-anchor="middle" fill="white">• LayerNorm → MHA (8 heads, GQA 4 KV heads)</text>
  <text x="1245" y="599" font-family="Arial" font-size="11" text-anchor="middle" fill="white">• LayerNorm → MLP (2048→16384→2048)</text>
  <text x="1245" y="616" font-family="Arial" font-size="11" text-anchor="middle" fill="white">• Residual Connections</text>
  
  <!-- ==================== Context Vector ==================== -->
  <rect x="950" y="670" width="590" height="110" fill="url(#redGrad)" rx="10" filter="url(#shadow)"/>
  <text x="1245" y="705" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="white">Context Vector Extraction</text>
  <text x="1245" y="735" font-family="Arial" font-size="13" text-anchor="middle" fill="white">Extract [CLS] / First Token Representation</text>
  <text x="1245" y="765" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Output: [B, 2048]</text>
  <text x="1245" y="785" font-family="Arial" font-size="12" text-anchor="middle" fill="white">↓ Pass to Action Expert Decoder</text>
  
  <!-- ==================== Transformer Block Detail ==================== -->
  <rect x="100" y="420" width="680" height="360" fill="#FFFFFF" rx="10" stroke="#333" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="455" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#1E293B">Transformer Block 详细结构</text>
  
  <!-- LayerNorm 1 -->
  <rect x="130" y="485" width="140" height="60" fill="#EC4899" rx="6"/>
  <text x="200" y="515" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="white">LayerNorm₁</text>
  <text x="200" y="535" font-family="Courier" font-size="9" text-anchor="middle" fill="white">ln(x) = x/||x|| × γ + β</text>
  
  <!-- MHA -->
  <rect x="310" y="485" width="240" height="60" fill="#4285F4" rx="6"/>
  <text x="430" y="510" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Multi-Head Attention</text>
  <text x="430" y="530" font-family="Courier" font-size="9" text-anchor="middle" fill="white">Q=XW_Q, K=XW_K, V=XW_V</text>
  <text x="430" y="545" font-family="Courier" font-size="9" text-anchor="middle" fill="white">Attn(Q,K,V)=softmax(QKᵀ/√d)V</text>
  
  <!-- Residual 1 -->
  <path d="M 270 515 L 305 515" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 200 545 L 200 590 L 550 590 L 550 550" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="235" y="580" font-family="Arial" font-size="10" fill="#666">+ Residual</text>
  
  <!-- LayerNorm 2 -->
  <rect x="130" y="615" width="140" height="60" fill="#EC4899" rx="6"/>
  <text x="200" y="645" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="white">LayerNorm₂</text>
  <text x="200" y="665" font-family="Courier" font-size="9" text-anchor="middle" fill="white">ln(x) = x/||x|| × γ + β</text>
  
  <!-- MLP -->
  <rect x="310" y="615" width="240" height="60" fill="#10B981" rx="6"/>
  <text x="430" y="640" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="white">MLP (Feed-Forward)</text>
  <text x="430" y="660" font-family="Courier" font-size="9" text-anchor="middle" fill="white">FFN(x) = GELU(xW₁+b₁)W₂+b₂</text>
  <text x="430" y="675" font-family="Courier" font-size="9" text-anchor="middle" fill="white">2048 → 16384 → 2048</text>
  
  <!-- Residual 2 -->
  <path d="M 270 645 L 305 645" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 200 675 L 200 720 L 550 720 L 550 680" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="235" y="710" font-family="Arial" font-size="10" fill="#666">+ Residual</text>
  
  <!-- Output -->
  <rect x="590" y="615" width="170" height="60" fill="#8B5CF6" rx="6"/>
  <text x="675" y="645" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Output</text>
  <text x="675" y="665" font-family="Arial" font-size="11" text-anchor="middle" fill="white">[B, seq_len, 2048]</text>
  
  <path d="M 550 645 L 585 645" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- ==================== 数据流标注 ==================== -->
  <text x="500" y="330" font-family="Arial" font-size="12" fill="#4285F4" font-weight="bold">
    Vision Flow: [B,3,224,224] → [B,256,1152] → [B,257,1152] → [B,256,2048]
  </text>
  
  <text x="500" y="850" font-family="Arial" font-size="12" fill="#10B981" font-weight="bold">
    Language Flow: [B,seq_len] → [B,seq_len,2048] → [B,L,2048] → [B,2048]
  </text>
  
  <!-- ==================== 关键公式 ==================== -->
  <rect x="100" y="820" width="680" height="200" fill="#FEF3C7" rx="10" stroke="#F59E0B" stroke-width="2"/>
  <text x="440" y="850" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#92400E">关键数学公式</text>
  
  <text x="120" y="885" font-family="Arial" font-size="12" fill="#78350F" font-weight="bold">1. Patch Embedding:</text>
  <text x="140" y="908" font-family="Courier" font-size="11" fill="#78350F">PatchEmbed(I)ᵢ,ⱼ = Σ W·I + b</text>
  
  <text x="120" y="940" font-family="Arial" font-size="12" fill="#78350F" font-weight="bold">2. Self-Attention:</text>
  <text x="140" y="963" font-family="Courier" font-size="11" fill="#78350F">Attention(Q,K,V) = softmax(QKᵀ/√dₖ)V</text>
  
  <text x="120" y="995" font-family="Arial" font-size="12" fill="#78350F" font-weight="bold">3. Multi-Head Attention:</text>
  <text x="140" y="1018" font-family="Courier" font-size="11" fill="#78350F">MultiHead = Concat(head₁,...,headₕ)Wᴼ</text>
  
  <!-- 连接线 -->
  <line x1="320" y1="195" x2="365" y2="195" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="590" y1="195" x2="635" y2="195" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="860" y1="195" x2="945" y2="195" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 1270 200 L 1270 240 L 1315 240" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 1430 270 L 1430 350 L 1245 350 L 1245 415" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="1245" y1="620" x2="1245" y2="665" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- 图例 -->
  <rect x="1350" y="820" width="200" height="200" fill="#FFFFFF" rx="10" stroke="#333" stroke-width="1"/>
  <text x="1450" y="850" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#1E293B">图例说明</text>
  
  <rect x="1370" y="870" width="30" height="20" fill="url(#blueGrad)" rx="3"/>
  <text x="1410" y="885" font-family="Arial" font-size="10" fill="#333">Vision 模块</text>
  
  <rect x="1370" y="900" width="30" height="20" fill="url(#greenGrad)" rx="3"/>
  <text x="1410" y="915" font-family="Arial" font-size="10" fill="#333">Language 模块</text>
  
  <rect x="1370" y="930" width="30" height="20" fill="url(#purpleGrad)" rx="3"/>
  <text x="1410" y="945" font-family="Arial" font-size="10" fill="#333">融合/投影</text>
  
  <rect x="1370" y="960" width="30" height="20" fill="url(#redGrad)" rx="3"/>
  <text x="1410" y="975" font-family="Arial" font-size="10" fill="#333">输出</text>
  
  <line x1="1370" y1="1000" x2="1400" y2="1000" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="1410" y="1005" font-family="Arial" font-size="10" fill="#333">数据流方向</text>
</svg>
