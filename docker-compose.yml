# Docker Compose for VLA Training
version: '3.8'

services:
  vla-training:
    build: .
    image: vla-training:latest
    container_name: vla-training
    
    # GPU 支持
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    # 环境变量
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1
      - WANDB_API_KEY=${WANDB_API_KEY:-}
    
    # 挂载卷
    volumes:
      - ./:/workspace/vla-training
      - ./data:/workspace/data
      - ./checkpoints:/workspace/checkpoints
      - ./logs:/workspace/logs
    
    # 端口映射
    ports:
      - "8888:8888"  # Jupyter
      - "6006:6006"  # TensorBoard
    
    # 工作目录
    working_dir: /workspace/vla-training
    
    # 保持运行
    stdin_open: true
    tty: true
    
    # 命令
    command: /bin/bash

  # Jupyter 服务
  jupyter:
    build: .
    image: vla-training:latest
    container_name: vla-jupyter
    
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    environment:
      - CUDA_VISIBLE_DEVICES=0
    
    volumes:
      - ./:/workspace/vla-training
    
    ports:
      - "8889:8888"
    
    working_dir: /workspace/vla-training
    
    command: >
      jupyter notebook
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''

  # TensorBoard 服务
  tensorboard:
    build: .
    image: vla-training:latest
    container_name: vla-tensorboard
    
    volumes:
      - ./logs:/workspace/logs
    
    ports:
      - "6007:6006"
    
    command: >
      tensorboard
      --logdir=/workspace/logs
      --port=6006
      --bind_all
